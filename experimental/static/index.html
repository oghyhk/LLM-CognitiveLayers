<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basti - Cognitive Architecture</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222636;
    --border: #2a2e3a;
    --text: #e2e4e9;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-hover: #8aa4ff;
    --accent-subtle: rgba(108, 140, 255, 0.1);
    --user-bubble: #1e3a5f;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(108, 140, 255, 0.5);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 150ms ease;
  }

  .btn-icon:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: #3a3f52;
  }

  .btn-icon svg { width: 18px; height: 18px; }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 720px;
    animation: slideIn 200ms ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .msg.assistant .avatar {
    background: var(--accent-subtle);
    color: var(--accent);
  }

  .msg.user .avatar {
    background: rgba(30, 58, 95, 0.6);
    color: #6cb2ff;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
    color: #c8dcff;
  }

  .bubble p + p { margin-top: 8px; }
  .bubble code {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .bubble pre {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .bubble pre code { background: none; padding: 0; }

  /* Response content */
  .response-content { min-height: 1.5em; }

  /* Thinking panel */
  .thinking-panel {
    margin-top: 6px;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }

  .thinking-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
  }

  .thinking-header:hover { color: var(--accent); }

  .thinking-header .chevron {
    width: 12px; height: 12px;
    transition: transform 150ms ease;
    flex-shrink: 0;
  }

  .thinking-header.open .chevron {
    transform: rotate(180deg);
  }

  .thinking-summary {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.02em;
  }

  .thinking-body {
    display: none;
    padding: 6px 0 2px 18px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .thinking-body.open { display: block; }

  .thinking-step {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px rgba(108, 140, 255, 0.5);
    animation: pulse-dot 1.2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); opacity: 0.6; }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--accent-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }

  .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 320px; line-height: 1.6; }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    transition: border-color 150ms;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }

  #messageInput {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    padding: 8px 10px;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 160px;
  }

  #messageInput::placeholder { color: var(--text-muted); }

  .send-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
    transition: background 150ms ease, opacity 150ms ease;
  }

  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 340px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    transform: translateX(100%);
    transition: transform 200ms ease;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 12px;
    margin-top: 24px;
  }

  .sidebar h3:first-child { margin-top: 0; }

  .sidebar .stat {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .sidebar .stat-label { color: var(--text-muted); }
  .sidebar .stat-value { color: var(--text); }

  .goal-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    background: var(--accent-subtle);
    color: var(--accent);
    margin: 2px 4px 2px 0;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
    display: none;
  }

  .overlay.show { display: block; }

  /* Mode switcher */
  .mode-switcher {
    display: flex;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 150ms ease;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--accent-subtle);
    color: var(--accent);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text);
    background: var(--surface-hover);
  }

  .mode-indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }

  .mode-indicator.api { background: #6cb2ff; box-shadow: 0 0 6px rgba(108, 178, 255, 0.5); }
  .mode-indicator.local { background: #6cff8c; box-shadow: 0 0 6px rgba(108, 255, 140, 0.5); }

  @media (max-width: 500px) {
    header { padding: 10px 14px; }
    .chat { padding: 14px; }
    .input-area { padding: 12px 14px; }
    .msg { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="statusDot"></div>
    <span>Basti</span>
  </div>
  <div class="mode-switcher" id="modeSwitcher">
    <button class="mode-btn active" id="modeApi" onclick="switchMode('api')">API</button>
    <button class="mode-btn" id="modeLocal" onclick="switchMode('local')">Local</button>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleSidebar()" title="View cognitive state" aria-label="View cognitive state">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M10.5 6h9.75M10.5 12h9.75M10.5 18h9.75M4.5 6a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM4.5 12a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM4.5 18a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
      </svg>
    </button>
    <button class="btn-icon" onclick="resetChat()" title="Reset session" aria-label="Reset session">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
      </svg>
    </button>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <h3>Cognitive State</h3>
  <div id="sidebarContent">
    <span style="color: var(--text-muted); font-size: 13px;">Loading...</span>
  </div>
</aside>

<div class="chat" id="chatContainer">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="1.5">
        <path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/>
      </svg>
    </div>
    <h2>Basti Cognitive Architecture</h2>
    <p>Basti thinks, remembers, and knows you. Built on the DaoTi framework with deepseek-v4-flash.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="messageInput" placeholder="Type a message..." rows="1" autofocus></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatContainer = document.getElementById('chatContainer');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const statusDot = document.getElementById('statusDot');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  let isProcessing = false;
  let progressPoll = null;
  let currentMode = 'api';

  const STEP_LABELS = {
    "idle": "Idle",
    "parsing input": "Parsing input",
    "updating state": "Updating cognitive state",
    "spreading activation": "Activating concept graph",
    "retrieving memories": "Retrieving memories",
    "planning": "Planning response",
    "checking capabilities": "Checking self-capabilities",
    "building identity context": "Building identity context",
    "loading user profile": "Loading user profile",
    "calling LLM": "Generating with deepseek-v4-flash",
    "running local LLM": "Generating with Gemma 2B",
  };

  const API_STEPS = [
    "parsing input", "updating state", "spreading activation",
    "retrieving memories", "planning", "checking capabilities",
    "building identity context", "loading user profile", "calling LLM"
  ];

  const LOCAL_STEPS = [
    "parsing input", "updating state", "spreading activation",
    "retrieving memories", "planning", "checking capabilities",
    "building identity context", "loading user profile", "running local LLM"
  ];

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
  });

  function switchMode(mode) {
    if (isProcessing) return;
    fetch('/api/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode })
    }).then(r => r.json()).then(data => {
      currentMode = data.mode;
      document.getElementById('modeApi').classList.toggle('active', mode === 'api');
      document.getElementById('modeLocal').classList.toggle('active', mode === 'local');
      statusDot.style.background = mode === 'local' ? '#6cff8c' : '';
    });
  }

  function toggleSidebar() {
    const open = sidebar.classList.toggle('open');
    overlay.classList.toggle('show', open);
    if (open) refreshSidebar();
  }

  function resetChat() {
    if (isProcessing) return;
    fetch('/api/reset', { method: 'POST' })
      .then(() => {
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        emptyState.style.display = '';
      });
  }

  async function refreshSidebar() {
    try {
      const [sRes, mRes, uRes, iRes] = await Promise.all([
        fetch('/api/state'), fetch('/api/mem'), fetch('/api/user'), fetch('/api/identity')
      ]);
      const state = await sRes.json(), mem = await mRes.json();
      const user = await uRes.json(), identity = await iRes.json();

      let html = '';
      if (user.name || user.interaction_count) {
        html += '<h3>User</h3>';
        if (user.name) html += `<div class="stat"><span class="stat-label">Name</span><span class="stat-value">${esc(user.name)}</span></div>`;
        html += `<div class="stat"><span class="stat-label">Interactions</span><span class="stat-value">${user.interaction_count || 0}</span></div>`;
        if (user.expertise_levels && Object.keys(user.expertise_levels).length) {
          html += '<div style="margin-top:6px;font-size:12px;color:var(--text-muted)">Expertise:</div>';
          for (const [k, v] of Object.entries(user.expertise_levels)) {
            html += `<div class="stat"><span class="stat-label" style="padding-left:8px">${esc(k)}</span><span class="stat-value">${(v * 100).toFixed(0)}%</span></div>`;
          }
        }
        if (user.personal_facts && user.personal_facts.length) {
          html += '<div style="margin-top:6px;font-size:12px;color:var(--text-muted)">Facts about user:</div>';
          html += '<div style="font-size:12px;color:var(--text);line-height:1.5">';
          user.personal_facts.slice(-5).forEach(f => { html += `${esc(f.fact)}<br>`; });
          html += '</div>';
        }
      }

      html += '<h3>Identity V' + (identity.identity_version || '?') + '</h3>';
      html += `<div style="font-size:12px;color:var(--text);line-height:1.5;margin-bottom:12px">${esc(identity.persona || '')}</div>`;
      if (identity.traits && Object.keys(identity.traits).length) {
        html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Personality:</div>';
        for (const [k, v] of Object.entries(identity.traits)) {
          html += `<div class="stat"><span class="stat-label">${esc(k)}</span><span class="stat-value">${(v * 100).toFixed(0)}%</span></div>`;
        }
      }
      if (identity.total_interactions) {
        html += `<div class="stat"><span class="stat-label">Total interactions</span><span class="stat-value">${identity.total_interactions}</span></div>`;
      }

      html += '<h3>Goals</h3>';
      if (state.active_goals && state.active_goals.length) {
        html += state.active_goals.map(g => `<span class="goal-tag">${esc(g.description || 'Untitled')}</span>`).join('');
      } else {
        html += '<span style="color:var(--text-muted);font-size:13px">No active goals</span>';
      }

      html += '<h3>Emotions</h3>';
      if (state.emotional_weights && Object.keys(state.emotional_weights).length) {
        for (const [k, v] of Object.entries(state.emotional_weights)) {
          html += `<div class="stat"><span class="stat-label">${esc(k)}</span><span class="stat-value">${(v * 100).toFixed(0)}%</span></div>`;
        }
      } else {
        html += '<span style="color:var(--text-muted);font-size:13px">Neutral</span>';
      }

      html += '<h3>Memory</h3>';
      html += `<pre style="font-size:12px;color:var(--text-muted);white-space:pre-wrap;line-height:1.5">${esc(mem.summary || 'No memories')}</pre>`;

      document.getElementById('sidebarContent').innerHTML = html;
    } catch (e) { console.error(e); }
  }

  async function sendMessage() {
    if (isProcessing) return;
    const message = messageInput.value.trim();
    if (!message) return;

    isProcessing = true;
    sendBtn.disabled = true;
    if (emptyState.parentNode) emptyState.style.display = 'none';

    addMessage('user', message);
    messageInput.value = '';
    messageInput.style.height = 'auto';

    const startTime = performance.now();
    const msgEl = addAssistantPlaceholder();
    const bodyEl = msgEl.querySelector('.thinking-body');
    const summaryEl = msgEl.querySelector('.thinking-summary');
    let lastStep = 'parsing input';

    progressPoll = setInterval(async () => {
      try {
        const res = await fetch('/api/progress');
        const data = await res.json();
        const step = data.step || 'idle';
        if (step !== lastStep && bodyEl) {
          lastStep = step;
          updateThinkingSteps(bodyEl, step, true);
        }
      } catch (e) {}
    }, 300);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
      const promptTokens = data.usage?.prompt_tokens || 0;
      finishAssistantMessage(msgEl, data.response, elapsed, promptTokens);
    } catch (e) {
      const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
      finishAssistantMessage(msgEl, `Error: ${e.message}`, elapsed, 0);
    }

    clearInterval(progressPoll);
    progressPoll = null;
    isProcessing = false;
    sendBtn.disabled = false;
    messageInput.focus();
  }

  function addAssistantPlaceholder() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="avatar">B</div>
      <div class="bubble">
        <div class="response-content">
          <div class="typing-indicator">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
          </div>
        </div>
        <div class="thinking-panel">
          <div class="thinking-header open" onclick="window.toggleThinking && toggleThinking(this)">
            <svg class="chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            <span class="thinking-summary">Thinking</span>
          </div>
          <div class="thinking-body open">
            <div class="thinking-step"><span class="step-dot active"></span><span>${esc(STEP_LABELS['parsing input'])}</span></div>
          </div>
        </div>
      </div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div.querySelector('.bubble');
  }

  function finishAssistantMessage(bubble, content, elapsedSeconds, promptTokens) {
    const contentEl = bubble.querySelector('.response-content');
    contentEl.innerHTML = formatContent(content);

    const header = bubble.querySelector('.thinking-header');
    const body = bubble.querySelector('.thinking-body');
    header.classList.remove('open');
    body.classList.remove('open');

    const summary = bubble.querySelector('.thinking-summary');
    const modeLabel = currentMode === 'local' ? 'local' : 'API';
    if (promptTokens > 0) {
      summary.textContent = `${esc(elapsedSeconds)}s \u00b7 ${esc(promptTokens)} tokens in (${modeLabel})`;
    } else {
      summary.textContent = `${esc(elapsedSeconds)}s (${modeLabel})`;
    }

    updateThinkingSteps(body, 'idle', false);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  window.toggleThinking = function(header) {
    header.classList.toggle('open');
    header.nextElementSibling.classList.toggle('open');
  };

  function updateThinkingSteps(body, activeStep, animate) {
    const steps = currentMode === 'local' ? LOCAL_STEPS : API_STEPS;
    let html = '';
    for (const step of steps) {
      const label = STEP_LABELS[step] || step;
      const active = (step === activeStep && animate) ? ' active' : '';
      html += `<div class="thinking-step"><span class="step-dot${active}"></span><span>${esc(label)}</span></div>`;
    }
    body.innerHTML = html;
  }

  function formatContent(text) {
    let html = esc(text);
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
